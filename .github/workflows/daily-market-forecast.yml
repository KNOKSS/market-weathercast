name: Daily market weather forecast

on:
  schedule:
    - cron: "25 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-market-weather-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/modeling/requirements.txt

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m pip install -r scripts/modeling/requirements.txt

      - name: Restore large research artifacts
        run: |
          if [ ! -f research-results/market-weather-eod-panel-v1/panel.jsonl.gz ]; then
            cat research-results/market-weather-eod-panel-v1/panel.jsonl.gz.part-* > research-results/market-weather-eod-panel-v1/panel.jsonl.gz
          fi
          if [ -f research-results/market-weather-eod-panel-v1/panel.jsonl.gz.sha256 ]; then
            cd research-results/market-weather-eod-panel-v1
            sha256sum -c panel.jsonl.gz.sha256
            cd -
          fi

      - name: Refresh completed daily candles
        run: pnpm shadow:refresh

      - name: Settle and record the next forecast
        run: |
          python scripts/shadow/run.py settle
          python scripts/shadow/run.py forecast
          python scripts/shadow/run.py register
          python scripts/shadow/run.py report
          python scripts/v2_validation/run.py
          python scripts/shadow/run.py export
          python scripts/shadow/run.py audit

      - name: Verify application build
        run: pnpm deploy:check

      - name: Publish the new official ledger
        run: |
          git config user.name "market-weather-bot"
          git config user.email "market-weather-bot@users.noreply.github.com"
          git add public/data/tomorrow-forecast.json
          git add research-results/market-weather-shadow-v1/forecast-ledger.jsonl
          git add research-results/market-weather-shadow-v1/benchmark-ledger.jsonl
          git add research-results/market-weather-shadow-v1/settlement-ledger.jsonl
          git add research-results/market-weather-shadow-v1/LATEST_FORECAST.md
          git add research-results/market-weather-shadow-v1/STATUS.json
          git add research-results/market-weather-shadow-v1/audit.json
          git add research-results/market-weather-v2-validation-v1/validation-results.json
          git add research-results/market-weather-v2-validation-v1/report.md
          git add research-results/market-weather-v2-validation-v1/prospective-results.json
          git add research-results/market-weather-v2-validation-v1/PROSPECTIVE_REPORT.md
          if git diff --cached --quiet; then
            echo "No new completed candle to publish."
          else
            git commit -m "data: update official market forecast"
            git push
          fi
